<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Cup Overlay — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="head">
        <img class="logo" src="../icons/icon48.png" alt="" />
        <div>
          <h1>World Cup Overlay</h1>
          <p class="sub">FIFA World Cup 2026 — settings</p>
        </div>
      </header>

      <section class="card">
        <h2>Position</h2>
        <p class="hint">Which corner the overlay sits in, on every page.</p>
        <div class="corners" role="radiogroup" aria-label="Overlay corner">
          <label><input type="radio" name="corner" value="tl" /><span>Top left</span></label>
          <label><input type="radio" name="corner" value="tr" /><span>Top right</span></label>
          <label><input type="radio" name="corner" value="bl" /><span>Bottom left</span></label>
          <label><input type="radio" name="corner" value="br" /><span>Bottom right</span></label>
        </div>
      </section>

      <section class="card">
        <h2>Behavior</h2>
        <label class="row" for="startMinimized">
          <span class="label"
            ><strong>Start minimized</strong
            ><small>Show only the small ball until you click it.</small></span
          >
          <input type="checkbox" id="startMinimized" />
        </label>
        <label class="row" for="refreshMins">
          <span class="label"
            ><strong>Refresh interval</strong
            ><small>How often scores update in the background.</small></span
          >
          <span class="range">
            <input type="range" id="refreshMins" min="1" max="30" step="1" />
            <output id="refreshOut" for="refreshMins"></output>
          </span>
        </label>
      </section>

      <section class="card">
        <h2>Notifications</h2>
        <p class="hint">Desktop alerts even when no tab is focused.</p>
        <label class="row" for="notifyEnabled">
          <span class="label"
            ><strong>Enable notifications</strong
            ><small>Kickoff reminders and score updates.</small></span
          >
          <input type="checkbox" id="notifyEnabled" />
        </label>
        <label class="row" for="notifyFavoritesOnly">
          <span class="label"
            ><strong>Only my favorites</strong
            ><small>Alert only for nations you follow (★).</small></span
          >
          <input type="checkbox" id="notifyFavoritesOnly" />
        </label>
        <label class="row" for="notifyKickoff">
          <span class="label"
            ><strong>Kickoff reminders</strong><small>Shortly before a match starts.</small></span
          >
          <input type="checkbox" id="notifyKickoff" />
        </label>
        <label class="row" for="notifyGoals">
          <span class="label"
            ><strong>Goals &amp; live</strong
            ><small>When a match goes live or the score changes.</small></span
          >
          <input type="checkbox" id="notifyGoals" />
        </label>
        <label class="row" for="notifyFullTime">
          <span class="label"><strong>Full time</strong><small>Final results.</small></span>
          <input type="checkbox" id="notifyFullTime" />
        </label>
        <label class="row" for="notifyLead">
          <span class="label"
            ><strong>Reminder lead time</strong
            ><small>How early the kickoff reminder fires.</small></span
          >
          <span class="range">
            <input type="range" id="notifyLead" min="1" max="120" step="1" />
            <output id="notifyLeadOut" for="notifyLead"></output>
          </span>
        </label>
      </section>

      <footer class="foot">
        <span id="status" class="status" role="status" aria-live="polite"></span>
        <span class="muted">Settings sync across your Chrome profiles.</span>
      </footer>
    </main>

    <script src="settings.js"></script>
    <script src="options.js"></script>
  </body>
</html>
