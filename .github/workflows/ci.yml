name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run plugin tests
        run: |
          set -e
          for d in plugins/*/; do
            name=$(basename "$d")
            case "$name" in _*) continue;; esac
            if ls "$d"test/*.test.mjs >/dev/null 2>&1; then
              echo "::group::node --test ($name)"
              ( cd "$d" && node --test )
              echo "::endgroup::"
            fi
          done

      - name: Validate manifests
        run: |
          set -e
          for d in plugins/*/; do
            name=$(basename "$d")
            case "$name" in _*) continue;; esac
            [ -f "$d/manifest.json" ] && node scripts/validate-manifest.mjs "$d"
          done

      - name: Package distributables
        run: |
          set -e
          for d in plugins/*/; do
            name=$(basename "$d")
            case "$name" in _*) continue;; esac
            [ -f "$d/manifest.json" ] && scripts/package.sh "$name"
          done

      - name: Upload built zips
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.zip
          if-no-files-found: ignore
